<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Dashboard</title>

<!-- Styles -->
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1220;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:220px;
  height:100%;
  background:#111827;
  padding:20px;
}

.sidebar h2{
  color:#22c55e;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  background:#1f2937;
}

.sidebar a:hover{
  background:#374151;
}

/* MAIN CONTENT */
.main{
  margin-left:240px;
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

.balance{
  font-size:28px;
  color:#22c55e;
}

.profit{
  font-size:20px;
  color:#38bdf8;
}

/* TRADING PANEL */
.trade-box{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

.trade-box input, .trade-box select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

.trade-box button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:48%;
}

.buy{background:#22c55e; color:white;}
.sell{background:#ef4444; color:white;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{
    width:100%;
    height:auto;
    position:relative;
  }
  .main{
    margin-left:0;
  }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>TradeX</h2>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="payment.html">➕ Deposit</a>
<a href="withdrawal.html">💸 Withdraw</a>
</div>

<!-- Main Content -->
<div class="main">
<h2>📊 Trading Dashboard</h2>

<!-- Wallet Cards -->
<div class="cards">
  <div class="card">
    <p>Wallet Balance</p>
    <div class="balance" id="balance">$0.00</div>
  </div>
  <div class="card">
    <p>Profit %</p>
    <div class="profit" id="profit">0%</div>
  </div>
</div>

<!-- TradingView Chart -->
<div class="card" style="margin-top:20px;">
<h3>Live Market Chart</h3>
<div id="tradingview"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "BTCUSD",
  "interval": "1",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "container_id": "tradingview"
});
</script>
</div>

<!-- Trade Panel -->
<div class="trade-box">
<h3>💱 Trade Panel</h3>
<select id="asset">
  <option value="BTCUSD">BTC/USD</option>
  <option value="ETHUSD">ETH/USD</option>
  <option value="USDTUSD">USDT/USD</option>
</select>
<input type="number" id="amount" placeholder="Enter amount">
<div style="display:flex; justify-content:space-between;">
  <button class="buy" onclick="buy()">BUY</button>
  <button class="sell" onclick="sell()">SELL</button>
</div>
</div>

</div>

<script>
// INITIALIZE BALANCE & PROFIT
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let profit = parseFloat(localStorage.getItem("profit")) || 0;

function updateUI(){
  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
  document.getElementById("profit").innerText = profit.toFixed(2) + "%";
}

// SYNC DEPOSIT FROM payment.html
function syncDeposit(){
  let deposit = parseFloat(localStorage.getItem("lastDeposit")) || 0;
  if(deposit > 0){
    balance += deposit;
    localStorage.setItem("balance", balance);
    localStorage.setItem("lastDeposit", 0);
  }
}

// BUY FUNCTION
function buy(){
  let amt = parseFloat(document.getElementById("amount").value);
  if(!amt || amt <= 0){ alert("Enter valid amount"); return;}
  if(amt > balance){ alert("Insufficient balance"); return;}
  balance -= amt;
  profit += Math.random()*5;
  localStorage.setItem("balance", balance);
  localStorage.setItem("profit", profit);
  updateUI();
}

// SELL FUNCTION
function sell(){
  let amt = parseFloat(document.getElementById("amount").value);
  if(!amt || amt <= 0){ alert("Enter valid amount"); return;}
  balance += amt;
  profit += Math.random()*3;
  localStorage.setItem("balance", balance);
  localStorage.setItem("profit", profit);
  updateUI();
}

// FAKE MARKET MOVEMENT
setInterval(()=>{
  profit += (Math.random()-0.5)*2;
  localStorage.setItem("profit", profit);
  updateUI();
},3000);

// INITIAL LOAD
syncDeposit();
updateUI();
</script>

</body>
</html>
