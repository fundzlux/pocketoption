<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #2563eb;
}

.note {
    font-size: 12px;
    color: #cbd5e1;
    margin-top: 10px;
    text-align: center;
}

.email-box {
    display: flex;
    gap: 5px;
}

.small-btn {
    width: 40%;
    font-size: 12px;
}

.status {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: lightgreen;
}
</style>
</head>

<body>

<div class="container">
    <h2>Secure Payment</h2>

    <p style="font-size:13px; text-align:center;">
        PayPal Email:
        <b id="email">iibrahimismaela@gmail.com</b>
    </p>

    <div class="email-box">
        <button class="small-btn" onclick="copyEmail()">Copy Email</button>
    </div>

    <input type="number" id="amount" placeholder="Enter Amount ($)" />

    <input type="text" id="auth" placeholder="Enter Authenticator Code" />

    <button onclick="sendPayment()">Pay Now</button>

    <p class="note">
        NOTE: Copy the PayPal email above before making payment.
        Payment will reflect on dashboard after confirmation.
    </p>

    <div class="status" id="status"></div>
</div>

<script>
function copyEmail() {
    const email = document.getElementById("email").innerText;
    navigator.clipboard.writeText(email);
    document.getElementById("status").innerText = "Email copied!";
}

// simple fake authenticator code
const AUTH_CODE = "123456";

function sendPayment() {
    const amount = document.getElementById("amount").value;
    const auth = document.getElementById("auth").value;

    if (!amount) {
        alert("Please enter amount");
        return;
    }

    if (auth !== AUTH_CODE) {
        alert("Invalid authenticator code!");
        return;
    }

    // store for dashboard
    localStorage.setItem("paidAmount", amount);

    document.getElementById("status").innerText =
        "Payment successful! Redirecting...";

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1500);
}
</script>

</body>
</html>
