<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Trading Platform</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d1117;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Candlestick Background */
.chart{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:15px;
    opacity:0.25;
}

.candle{
    width:18px;
    position:relative;
    animation:move 2s infinite alternate;
}

.candle::before{
    content:'';
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:2px;
    height:120%;
    background:white;
}

.green{
    background:#00ff88;
}

.red{
    background:#ff4d4d;
}

@keyframes move{
    from{
        transform:scaleY(0.8);
    }
    to{
        transform:scaleY(1.2);
    }
}

/* Main Content */
.container{
    text-align:center;
    z-index:10;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    color:#b0b0b0;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

.btn{
    text-decoration:none;
    padding:12px 30px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.login{
    background:#00ff88;
    color:black;
}

.signup{
    background:#1f6feb;
    color:white;
}

.btn:hover{
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="chart">
    <div class="candle green" style="height:120px;"></div>
    <div class="candle red" style="height:80px;"></div>
    <div class="candle green" style="height:150px;"></div>
    <div class="candle red" style="height:100px;"></div>
    <div class="candle green" style="height:180px;"></div>
    <div class="candle red" style="height:140px;"></div>
    <div class="candle green" style="height:220px;"></div>
</div>

<div class="container">
    <h1>ForexPro</h1>
    <p>Trade Forex, Crypto & Commodities Anytime, Anywhere</p>

    <div class="buttons">
        <a href="login.html" class="btn login">Login</a>
        <a href="signup.html" class="btn signup">Sign Up</a>
    </div>
</div>

</body>
</html>
